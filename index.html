<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Credicel POS V16.0 - Blindado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card { transition: all 0.1s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; } /* [cite: 152] */
        .product-card:active { transform: scale(0.95); background-color: #eff6ff; } /* [cite: 153] */
        .blue-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); } /* [cite: 154] */
        .sidebar { transition: 0.3s; width: 350px; position: fixed; inset: 0 auto 0 0; z-index: 300; background: white; border-right: 5px solid #1e3a8a; } /* [cite: 155] */
        .sidebar.closed { transform: translateX(-100%); } /* [cite: 156] */
        #loading { display: none; } /* [cite: 157, 158] */
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden flex flex-col font-sans">

    <div id="loading" class="fixed inset-0 bg-black/60 z-[500] flex items-center justify-center text-white font-black italic uppercase text-center">
        <div>PROCESANDO EN MATRIZ...<br><span class="text-[10px] font-normal tracking-widest">No cierres la ventana</span></div>
    </div>

    <header class="blue-gradient p-2 text-white flex justify-between items-center shadow-lg">
        <div class="flex gap-1">
            <button onclick="toggleSidebar()" class="bg-yellow-400 text-blue-900 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-md">CORTE</button>
            <div id="admin-tools" class="hidden flex gap-1">
                <button onclick="ajusteInv('ENTRADA')" class="bg-blue-500 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Entrada</button>
                <button onclick="ajusteInv('SALIDA')" class="bg-red-500 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Ajuste/Merma</button>
                <button onclick="ajusteInv('TRASPASO')" class="bg-blue-500 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Traspaso</button>
                <button onclick="modalEquipo()" class="bg-indigo-600 px-3 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Equipo</button> </div>
        </div>
        <div class="text-right uppercase font-black italic leading-none">
            <div id="v-nom" class="text-[10px]"></div>
            <div id="v-suc" class="text-yellow-400 text-[8px]"></div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <main class="flex-1 p-2 overflow-y-auto grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2" id="grid"></main> <aside class="w-80 bg-white border-l p-4 flex flex-col shadow-xl">
            <div class="text-center mb-4 border-b pb-4">
                <span class="text-3xl font-black text-blue-600">$<span id="t-v">0.00</span></span>
                <button onclick="abrirCobro()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-xl mt-2 shadow-lg">COBRAR</button>
                <button onclick="limpiarVenta()" class="mt-2 text-[9px] text-slate-400 uppercase font-bold underline">Limpiar</button> </div>
            <div id="carrito" class="flex-1 overflow-y-auto space-y-1"></div>
        </aside>
    </div>

    <div id="modal-cobro" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center p-4 z-[200]">
        <div class="bg-white rounded-[2rem] max-w-sm w-full p-6 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-4 text-blue-900 uppercase italic">Finalizar Cobro</h2>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="quickPay(100)" class="bg-slate-100 py-4 rounded-xl font-black text-slate-500">$100</button>
                <button onclick="quickPay(200)" class="bg-slate-100 py-4 rounded-xl font-black text-slate-500">$200</button>
                <button onclick="quickPay(500)" class="bg-slate-100 py-4 rounded-xl font-black text-slate-500">$500</button> </div>
            <input type="number" id="pago-cliente" oninput="calcCambio()" class="w-full p-4 border-2 rounded-xl text-center text-4xl font-black mb-4 outline-none" placeholder="0.00"> <div class="p-4 bg-yellow-400 rounded-xl mb-4 text-blue-900 font-black">
                <p class="text-[10px] uppercase opacity-70">Cambio:</p>
                <p class="text-4xl">$ <span id="cambio-v">0.00</span></p>
            </div>
            <button onclick="finalizarVenta()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black uppercase shadow-lg">Registrar</button>
            <button onclick="cerrarCobro()" class="mt-4 text-[10px] font-bold underline">Volver</button> </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-white z-[400] flex items-center justify-center p-4">
        <div class="max-w-sm w-full border-4 border-blue-900 p-8 rounded-[2rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-blue-900 italic mb-6 uppercase">Credi<span class="text-yellow-400">cel</span></h1>
            <select id="sel-u" class="w-full p-4 border-2 rounded-xl mb-4 font-bold text-blue-900"></select>
            <select id="sel-s" class="w-full p-4 border-2 rounded-xl mb-4 font-bold text-blue-900">
                <option>Navojoa</option><option>Huatabampo</option><option>Bodega</option> </select>
            <input id="pin" type="password" maxlength="6" class="w-full p-4 border-2 rounded-xl text-center text-2xl tracking-[10px] mb-4" placeholder="****">
            <button onclick="login()" class="w-full blue-gradient text-white py-5 rounded-2xl font-black uppercase shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar closed p-6 flex flex-col shadow-2xl border-r-[10px] border-blue-900">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-black text-blue-900 uppercase italic">Turno Actual</h2>
            <button onclick="toggleSidebar()" class="text-4xl font-bold">&times;</button>
        </div>
        <div id="corte-lista" class="flex-1 overflow-y-auto text-[10px] font-bold text-slate-500 space-y-2"></div>
        <div class="p-4 bg-blue-900 rounded-2xl my-4 text-center">
            <div id="total-corte" class="text-yellow-400 text-3xl font-black">$0.00</div> </div>
        <button onclick="enviarCorte()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase text-xs shadow-lg">Cerrar Turno</button>
    </div>

    <script>
        // URL ACTUALIZADA A VERSIÓN 16.0
        const URL = "https://script.google.com/macros/s/AKfycbwVEqN8Imb33u2bYnLNoC3rWc-M7mqjjKDfhuOaoREMRwmF6dDUckYij71ZQfw4rQfR9Q/exec";
        let USERS = [], PRODS = [], carrito = [], vNom = "", vSuc = "", corte = {}; // [cite: 169]

        window.onload = async () => {
            try {
                const res = await fetch(URL + "?action=getUsers");
                USERS = await res.json(); // [cite: 170, 171]
                document.getElementById('sel-u').innerHTML = USERS.map(u => `<option>${u.nombre}</option>`).join('');
                
                const memoU = localStorage.getItem('lastU'), memoS = localStorage.getItem('lastS');
                if(memoU) document.getElementById('sel-u').value = memoU;
                if(memoS) document.getElementById('sel-s').value = memoS; // [cite: 172]

                const backup = localStorage.getItem('backup_venta');
                if(backup) { carrito = JSON.parse(backup); actualizar(); } // [cite: 173]
                
                const backupCorte = localStorage.getItem('backup_corte');
                if(backupCorte) { corte = JSON.parse(backupCorte); } // [cite: 174]
            } catch (e) { alert("Error de conexión."); } // [cite: 175]
        };

        async function login() {
            // Limpieza de espacios en login para corregir error de Jesus Villa 
            const u = USERS.find(x => x.nombre.trim() == document.getElementById('sel-u').value.trim());
            if(u && u.pin.trim() == document.getElementById('pin').value.trim()) {
                vNom = u.nombre; vSuc = document.getElementById('sel-s').value; // [cite: 177]
                localStorage.setItem('lastU', vNom); localStorage.setItem('lastS', vSuc);
                if(vNom.toLowerCase() == "said") document.getElementById('admin-tools').classList.remove('hidden');
                document.getElementById('modal-login').style.display = 'none';
                document.getElementById('v-nom').innerText = vNom; document.getElementById('v-suc').innerText = vSuc;
                document.getElementById('loading').style.display = 'flex'; // [cite: 178]
                const res = await fetch(URL + "?action=getProducts");
                PRODS = await res.json();
                PRODS.push({id:'REP', n:'REPARACIÓN/VAR', p:0}, {id:'GAS', n:'GASTO INTERNO', p:0}); // [cite: 179]
                pintar();
                document.getElementById('loading').style.display = 'none';
            } else { alert("PIN Incorrecto."); } // [cite: 180]
        }

        function pintar() {
            document.getElementById('grid').innerHTML = PRODS.map(p => `
                <div onclick="clickProd('${p.id}', '${p.n}', ${p.p})" class="product-card bg-white p-2 rounded-xl text-center flex flex-col h-24 justify-between border">
                    <div class="text-blue-600 font-black text-[10px] uppercase">${p.id}</div>
                    <div class="text-[7px] font-bold text-slate-400 uppercase leading-none overflow-hidden h-4">${p.n}</div>
                    <div class="text-blue-900 font-black text-[10px]">${p.id === 'GAS' || p.id === 'REP' ? 'VAR' : '$'+p.p}</div>
                </div>`).join(''); // [cite: 181, 182]
        }

        function clickProd(id, n, p) {
            if(id === 'GAS') {
                const con = prompt("CONCEPTO:"), mon = prompt("MONTO:"); // [cite: 183]
                if(con && mon > 0) enviarManual({ tipo: "GASTO", vendedor: vNom, sucursal: vSuc, concepto: con, monto: parseFloat(mon) });
            } else if(id === 'REP') {
                const m = prompt("COSTO:"); // [cite: 184]
                if(m > 0) add(id, n, parseFloat(m));
            } else { add(id, n, p); } // [cite: 185, 186]
        }

        function add(id, n, p) { 
            carrito.push({id, n, p}); 
            localStorage.setItem('backup_venta', JSON.stringify(carrito)); // [cite: 187]
            actualizar(); 
        }

        function actualizar() {
            document.getElementById('carrito').innerHTML = carrito.map((item, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg text-[9px] border-l-4 border-blue-600 mb-1">
                    <span class="font-bold truncate w-40 uppercase">${item.n}</span>
                    <button onclick="del(${i})" class="text-red-500 text-lg font-black">&times;</button>
                </div>`).join(''); // [cite: 188]
            document.getElementById('t-v').innerText = carrito.reduce((a, b) => a + b.p, 0).toFixed(2); // [cite: 189]
        }

        function del(i) { carrito.splice(i, 1); localStorage.setItem('backup_venta', JSON.stringify(carrito)); actualizar(); } // [cite: 190]
        function limpiarVenta() { carrito = []; localStorage.removeItem('backup_venta'); actualizar(); } // [cite: 191]
        function abrirCobro() { if(carrito.length > 0) document.getElementById('modal-cobro').style.display = 'flex'; } // [cite: 192]
        function cerrarCobro() { document.getElementById('modal-cobro').style.display = 'none'; } // [cite: 193]
        function quickPay(n) { document.getElementById('pago-cliente').value = n; calcCambio(); } // [cite: 194]
        function calcCambio() {
            const t = parseFloat(document.getElementById('t-v').innerText), p = parseFloat(document.getElementById('pago-cliente').value) || 0; // [cite: 195]
            document.getElementById('cambio-v').innerText = (p - t > 0) ? (p - t).toFixed(2) : "0.00"; // [cite: 196]
        }

        async function finalizarVenta() {
            document.getElementById('loading').style.display = 'flex'; // [cite: 197]
            const agrupado = [];
            carrito.forEach(x => {
                let item = agrupado.find(i => i.codigo === x.id);
                if(item) { item.cantidad++; item.precio += x.p; }
                else { agrupado.push({codigo: x.id, cantidad: 1, precio: x.p}); }
                if(!corte[x.id]) corte[x.id] = {cant: 0, total: 0};
                corte[x.id].cant++; corte[x.id].total += x.p; // [cite: 198]
            });
            try {
                await fetch(URL, {method: 'POST', body: JSON.stringify({tipo: "VENTA", sucursal: vSuc, vendedor: vNom, items: agrupado})}); // [cite: 199]
                localStorage.setItem('backup_corte', JSON.stringify(corte)); // Persistencia del corte [cite: 200]
                localStorage.removeItem('backup_venta');
                alert("✅ Registrado.");
                carrito = []; actualizar(); cerrarCobro();
            } catch(e) { alert("Error de conexión. Carrito guardado."); } // [cite: 201]
            document.getElementById('loading').style.display = 'none'; // [cite: 202]
        }

        async function enviarManual(data) {
            document.getElementById('loading').style.display = 'flex';
            try { await fetch(URL, {method: 'POST', body: JSON.stringify(data)}); alert("✅ Éxito."); } // [cite: 203, 204]
            catch(e) { alert("Error."); } // [cite: 205]
            document.getElementById('loading').style.display = 'none'; // [cite: 206]
        }

        async function ajusteInv(modo) {
            let d = { tipo: "AJUSTE_INV", modo: modo };
            if(modo == "TRASPASO") {
                d.origen = prompt("Origen:"); d.destino = prompt("Destino:"); // [cite: 207, 208]
            } else { d.ubicacion = prompt("Sucursal:"); }
            d.codigo = prompt("Código:"); d.cantidad = prompt("Cantidad:"); // [cite: 209]
            if(d.codigo && d.cantidad) enviarManual(d);
        }

        async function modalEquipo() {
            const m = prompt("Modelo:"), i = prompt("IMEI:"), n = prompt("Número:"), c = prompt("Cliente:"), e = prompt("Enganche:");
            if(m && i) enviarManual({tipo: "EQUIPO", modelo: m, imei: i, numero: n, nombre: c, enganche: e, sucursal: vSuc}); // [cite: 210, 211]
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            let h = "", t = 0; // [cite: 212]
            for(let id in corte) {
                h += `<div class="flex justify-between border-b py-2 italic font-black uppercase"><span>${corte[id].cant}x ${id}</span><span>$${corte[id].total.toFixed(2)}</span></div>`;
                t += corte[id].total; // [cite: 213]
            }
            document.getElementById('corte-lista').innerHTML = h || "<p class='text-center py-10 opacity-30'>Vacío</p>"; // [cite: 214]
            document.getElementById('total-corte').innerText = "$"+t.toFixed(2);
        }

        async function enviarCorte() {
            const t = document.getElementById('total-corte').innerText.replace("$", "");
            if(confirm("¿Cerrar turno?")) { // [cite: 215]
                document.getElementById('loading').style.display = 'flex';
                try {
                    await fetch(URL, {method: 'POST', body: JSON.stringify({tipo: "VENTA", sucursal: vSuc, vendedor: vNom, items: [], corteX: t})}); // [cite: 216]
                    localStorage.removeItem('backup_corte'); window.location.reload(); // [cite: 217]
                } catch(e) { alert("Error al cerrar."); }
                document.getElementById('loading').style.display = 'none'; // [cite: 218]
            }
        }
    </script>
</body>
</html>
