<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Credicel POS V17.5 - Dark Mode Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modo Oscuro Vanguardista: Fondos Slate (Gris Profundo) y Acentos Esmeralda */
        html, body { height: 100%; margin: 0; padding: 0; background: #0f172a; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; color: #f8fafc;}
        .app-container { display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available;}
        header { flex-shrink: 0; z-index: 50; padding-top: env(safe-area-inset-top, 0.75rem);}
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 0.8rem; padding: 1rem;}
        
        /* Tarjetas Modo Oscuro */
        .product-card { transition: all 0.1s; border: 1px solid #334155; cursor: pointer; user-select: none; display: flex; flex-direction: column; justify-content: space-between; height: 135px; background: #1e293b; border-radius: 1rem; padding: 0.8rem; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);}
        .product-card:active { transform: scale(0.95); background-color: #064e3b;}
        
        /* Gradiente Oscuro Elegante para Header */
        .dark-gradient { background: linear-gradient(135deg, #022c22 0%, #065f46 100%); border-bottom: 1px solid #047857;}
        
        /* Sidebar Oscuro */
        .sidebar { transition: transform 0.3s ease-in-out; width: 85%; max-width: 350px; position: fixed; inset: 0 auto 0 0; z-index: 300; background: #1e293b; border-right: 5px solid #10b981; box-shadow: 10px 0 25px rgba(0,0,0,0.5);}
        .sidebar.closed { transform: translateX(-100%);}
        .content-main { flex: 1; display: flex; overflow: hidden;}
        .scroll-area { overflow-y: auto; -webkit-overflow-scrolling: touch;}
        #loading { display: flex; transition: opacity 0.3s ease;}
        
        /* Scrollbar estilizado para modo oscuro */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        @media (max-width: 768px) { .content-main { flex-direction: column; } .cart-panel { width: 100% !important; height: 45%; border-left: 0; border-top: 3px solid #334155;} }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">

    <div id="loading" class="fixed inset-0 bg-slate-950/80 z-[600] flex items-center justify-center text-emerald-400 font-black uppercase text-center backdrop-blur-sm">
        <div class="p-8 bg-slate-800 rounded-3xl border border-slate-700 shadow-2xl">
            <div class="animate-spin h-12 w-12 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            SINCRO MATRIZ...<br>
            <span class="text-xs font-bold opacity-60 tracking-widest text-slate-300">Iniciando Sistema</span>
        </div>
    </div>

    <div class="app-container">
        <header class="dark-gradient text-white shadow-lg flex flex-wrap gap-3 items-center justify-between p-4">
            <div class="flex flex-wrap gap-3">
                <button onclick="toggleSidebar()" class="bg-slate-800 border border-slate-600 text-emerald-400 hover:bg-slate-700 px-4 py-3 rounded-xl font-black text-xs uppercase shadow-md active:scale-90 transition">CORTE</button>
                <button onclick="modalEquipo()" class="bg-emerald-700 hover:bg-emerald-600 text-white px-4 py-3 rounded-xl font-black text-xs uppercase shadow-md active:scale-90 transition">EQUIPO</button>
                <div id="admin-tools" class="hidden flex flex-wrap gap-2">
                    <button onclick="ajusteInv('ENTRADA')" class="bg-slate-700 border border-slate-600 text-emerald-300 px-4 py-3 rounded-xl font-black text-xs uppercase shadow-sm">Entrada</button>
                    <button onclick="ajusteInv('SALIDA')" class="bg-slate-700 border border-red-900 text-red-400 px-4 py-3 rounded-xl font-black text-xs uppercase shadow-sm">Ajuste</button>
                    <button onclick="ajusteInv('TRASPASO')" class="bg-slate-700 border border-slate-600 text-emerald-300 px-4 py-3 rounded-xl font-black text-xs uppercase shadow-sm">Traspaso</button>
                </div>
            </div>
            <div class="text-right">
                <div id="v-nom" class="font-black uppercase text-xs leading-none text-slate-100"></div>
                <div id="v-suc" class="font-bold text-emerald-400 text-[10px] uppercase mt-1"></div>
            </div>
        </header>

        <div class="content-main">
            <main class="flex-1 scroll-area bg-slate-900">
                <div class="products-grid" id="grid"></div>
            </main>

            <aside class="cart-panel w-96 bg-slate-800 border-l flex flex-col shadow-xl border-slate-700">
                <div class="p-6 border-b text-center shrink-0 border-slate-700">
                    <div class="text-5xl font-black text-emerald-400 leading-none mb-4 tracking-tight">$<span id="t-v">0.00</span></div>
                    <button onclick="abrirCobro()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-2xl font-black text-2xl shadow-lg shadow-emerald-900/50 uppercase active:scale-95 transition">Cobrar</button>
                    <button onclick="limpiarVenta()" class="mt-4 text-xs text-slate-500 hover:text-slate-300 font-bold underline uppercase transition">Limpiar Carrito</button>
                </div>
                <div id="carrito" class="flex-1 scroll-area p-3 space-y-2 bg-slate-800/50"></div>
            </aside>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-slate-950/90 z-[400] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="w-full max-w-md border border-slate-700 p-8 rounded-3xl shadow-2xl text-center bg-slate-800">
            <h1 class="text-5xl font-black text-white italic mb-8 uppercase tracking-wide">Credi<span class="text-emerald-500">cel</span></h1>
            
            <select id="sel-u" class="w-full p-5 border border-slate-600 rounded-xl mb-4 font-bold text-xl bg-slate-900 text-slate-200 outline-none focus:border-emerald-500 transition"></select>
            
            <select id="sel-s" class="w-full p-5 border border-slate-600 rounded-xl mb-4 font-bold text-xl bg-slate-900 text-slate-200 outline-none focus:border-emerald-500 transition">
                <option>Navojoa</option><option>Huatabampo</option><option>Bodega</option>
            </select>
            
            <input id="pin" type="password" inputmode="numeric" maxlength="6" class="w-full p-5 border border-slate-600 rounded-xl text-center text-3xl tracking-[15px] mb-6 outline-none bg-slate-900 text-white placeholder-slate-600 focus:border-emerald-500 transition" placeholder="****">
            
            <button onclick="login()" class="w-full dark-gradient text-emerald-50 py-6 rounded-2xl font-black text-xl uppercase shadow-lg shadow-emerald-900/20 active:scale-95 transition">Entrar al Sistema</button>
        </div>
    </div>

    <div id="modal-cobro" class="fixed inset-0 bg-slate-950/90 hidden items-center justify-center p-4 z-[500] backdrop-blur-sm">
        <div class="bg-slate-800 rounded-3xl max-w-md w-full p-8 text-center shadow-2xl border border-slate-700">
            <h2 class="text-3xl font-black mb-6 text-slate-100 uppercase italic">Finalizar Cobro</h2>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <button onclick="quickPay(100)" class="bg-slate-700 py-5 rounded-xl font-black text-xl text-emerald-400 hover:bg-slate-600 transition">$100</button>
                <button onclick="quickPay(200)" class="bg-slate-700 py-5 rounded-xl font-black text-xl text-emerald-400 hover:bg-slate-600 transition">$200</button>
                <button onclick="quickPay(500)" class="bg-slate-700 py-5 rounded-xl font-black text-xl text-emerald-400 hover:bg-slate-600 transition">$500</button>
            </div>
            
            <input type="number" id="pago-cliente" oninput="calcCambio()" class="w-full p-5 border border-slate-600 rounded-xl text-center text-4xl font-black mb-6 outline-none bg-slate-900 text-white focus:border-emerald-500 transition" placeholder="0.00">
            
            <div class="p-5 bg-emerald-950 border border-emerald-800 rounded-xl mb-6 text-emerald-100 font-black">
                <p class="text-xs uppercase opacity-70 leading-none mb-1 text-emerald-300">Cambio a entregar:</p>
                <p class="text-5xl">$ <span id="cambio-v">0.00</span></p>
            </div>
            
            <button onclick="finalizarVenta()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-black text-xl uppercase shadow-lg shadow-emerald-900/50 transition">Registrar Venta</button>
            <button onclick="cerrarCobro()" class="mt-6 text-xs font-bold underline uppercase block mx-auto text-slate-400 hover:text-slate-200">Volver al carrito</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar closed p-6 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl text-slate-100 uppercase italic">Resumen Turno</h2>
            <button onclick="toggleSidebar()" class="text-5xl font-bold text-slate-500 hover:text-emerald-400 transition">&times;</button>
        </div>
        <div id="corte-lista" class="flex-1 scroll-area text-xs font-bold text-slate-400 space-y-3"></div>
        
        <div class="p-5 bg-slate-900 border border-slate-700 rounded-3xl my-4 text-left" id="total-corte"></div>
        
        <button onclick="enviarCorte()" class="w-full bg-red-900 hover:bg-red-800 border border-red-700 text-red-100 py-5 rounded-xl font-black uppercase text-sm shadow-lg transition">Cerrar Turno Oficial</button>
    </div>

    <script>
        // URL de Apps Script (Mantenida intacta)
        const URL = "https://script.google.com/macros/s/AKfycbyNEFuO2yvcUQ7FRaS0vdKzly0g3xAa5yE3rJYZg4lOXiR1ZoDmi2zqoMMg9m-wAdQUYg/exec";
        
        let USERS = [], PRODS = [], carrito = [], vNom = "", vSuc = "", corte = {};
        
        window.onload = async () => {
            try {
                const res = await fetch(URL + "?action=getUsers");
                if (!res.ok) throw new Error('Network error');
                USERS = await res.json();
                document.getElementById('sel-u').innerHTML = USERS.map(u => `<option>${u.nombre}</option>`).join('');
                
                const memoU = localStorage.getItem('lastU'), memoS = localStorage.getItem('lastS');
                if(memoU) document.getElementById('sel-u').value = memoU;
                if(memoS) document.getElementById('sel-s').value = memoS;
                
                const backup = localStorage.getItem('backup_venta');
                if(backup) { carrito = JSON.parse(backup); actualizar(); }
                
                const backupCorte = localStorage.getItem('backup_corte');
                if(backupCorte) { corte = JSON.parse(backupCorte); }
            } catch (e) { 
                console.error(e);
                alert("Error al conectar con Matriz."); 
            } finally { 
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 300); 
            }
        };

        async function login() {
            const u = USERS.find(x => x.nombre.trim() == document.getElementById('sel-u').value.trim());
            if(u && u.pin.trim() == document.getElementById('pin').value.trim()) {
                vNom = u.nombre;
                vSuc = document.getElementById('sel-s').value;
                localStorage.setItem('lastU', vNom); localStorage.setItem('lastS', vSuc);
                if(vNom.toLowerCase() == "said") document.getElementById('admin-tools').classList.remove('hidden');
                
                document.getElementById('modal-login').style.display = 'none';
                document.getElementById('v-nom').innerText = vNom; document.getElementById('v-suc').innerText = vSuc;
                document.getElementById('loading').style.display = 'flex'; document.getElementById('loading').style.opacity = '1';
                
                try {
                    const res = await fetch(URL + "?action=getProducts");
                    PRODS = await res.json();
                    PRODS.push({id:'ABONO', n:'ABONO CRÉDITO', p:0}, {id:'REP', n:'REPARACIÓN/VAR', p:0}, {id:'GAS', n:'GASTO INTERNO', p:0}, {id:'RECARGA', n:'RECARGA SALDO', p:0});
                    pintar();
                } catch (e) { alert("Error al cargar productos."); }
                
                document.getElementById('loading').style.display = 'none';
            } else { 
                alert("PIN Incorrecto."); 
            }
        }

        function pintar() {
            // Textos Modo Oscuro: ID (emerald-400), Nombre (slate-400), Precio (emerald-300)
            document.getElementById('grid').innerHTML = PRODS.map(p => `
                <div onclick="clickProd('${p.id}', '${p.n}', ${p.p})" class="product-card">
                    <div class="text-emerald-400 font-black text-xs uppercase truncate tracking-wide">${p.id}</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase leading-tight overflow-hidden h-8">${p.n}</div>
                    <div class="text-emerald-300 font-black text-sm">${['GAS', 'REP', 'ABONO', 'RECARGA'].includes(p.id) ? 'VAR' : '$'+p.p}</div>
                </div>`).join('');
        }

        function clickProd(id, n, p) {
            if(id === 'GAS') {
                const con = prompt("CONCEPTO DEL GASTO:");
                const mon = prompt("MONTO DEL GASTO:");
                if(con && mon > 0) {
                    const gastoF = parseFloat(mon);
                    enviarManual({ tipo: "GASTO", vendedor: vNom, sucursal: vSuc, concepto: con, monto: gastoF });
                    
                    const gastoNombre = 'GAS: ' + con.toUpperCase().substring(0, 15);
                    if(!corte[gastoNombre]) corte[gastoNombre] = {cant: 0, total: 0};
                    corte[gastoNombre].cant++;
                    corte[gastoNombre].total -= gastoF; 
                    localStorage.setItem('backup_corte', JSON.stringify(corte));
                }
            } else if(id === 'RECARGA') {
                const num = prompt("NÚMERO DE TELÉFONO:");
                if (num) {
                    const mon = prompt("MONTO DE LA RECARGA:");
                    if (mon > 0) add(id, "RECARGA: " + num, parseFloat(mon));
                }
            } else if(id === 'REP') {
                const modelo = prompt("MODELO DEL EQUIPO:");
                if (modelo) {
                    const tipo = prompt("TIPO DE REPARACIÓN:");
                    if (tipo) {
                        const m = prompt("COSTO DE LA REPARACIÓN:");
                        if (m > 0) {
                            add("REPARACION", "REP: " + modelo + " (" + tipo + ")", parseFloat(m), {modelo: modelo, tipoRep: tipo});
                        }
                    }
                }
            } else if(id === 'ABONO') {
                const m = prompt("MONTO ABONO:");
                if(m > 0) add(id, n, parseFloat(m));
            } else { 
                add(id, n, p); 
            }
        }

        function add(id, n, p, extra = null) { 
            carrito.push({id, n, p, extra});
            localStorage.setItem('backup_venta', JSON.stringify(carrito));
            actualizar(); 
        }

        function actualizar() {
            // Elementos del carrito en Modo Oscuro
            document.getElementById('carrito').innerHTML = carrito.map((item, i) => `
                <div class="flex justify-between items-center bg-slate-700/50 p-3 rounded-xl text-[11px] border-l-4 border-emerald-500 mb-2 shadow-sm">
                    <span class="font-bold truncate w-48 uppercase text-slate-200">${item.n}</span>
                    <button onclick="del(${i})" class="text-red-400 hover:text-red-300 text-2xl font-black px-2 hover:scale-110 active:scale-90 transition">&times;</button>
                </div>`).join('');
            document.getElementById('t-v').innerText = carrito.reduce((a, b) => a + b.p, 0).toFixed(2);
        }

        function del(i) { 
            carrito.splice(i, 1);
            localStorage.setItem('backup_venta', JSON.stringify(carrito)); 
            actualizar(); 
        }
        function limpiarVenta() { carrito = []; localStorage.removeItem('backup_venta'); actualizar(); }
        function abrirCobro() { if(carrito.length > 0) document.getElementById('modal-cobro').style.display = 'flex'; }
        function cerrarCobro() { document.getElementById('modal-cobro').style.display = 'none'; }
        function quickPay(n) { document.getElementById('pago-cliente').value = n; calcCambio(); }
        
        function calcCambio() { 
            const t = parseFloat(document.getElementById('t-v').innerText), p = parseFloat(document.getElementById('pago-cliente').value) || 0;
            document.getElementById('cambio-v').innerText = (p - t > 0) ? (p - t).toFixed(2) : "0.00";
        }

        async function finalizarVenta() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading').style.opacity = '1';
            
            const agrupado = [];
            carrito.forEach(x => {
                if (x.id === 'ABONO' || x.id === 'RECARGA' || x.id === 'REPARACION') {
                    agrupado.push({codigo: x.id, cantidad: 1, precio: x.p, extra: x.extra});
                } else {
                    let item = agrupado.find(i => i.codigo === x.id);
                    if(item) { item.cantidad++; item.precio += x.p; }
                    else { agrupado.push({codigo: x.id, cantidad: 1, precio: x.p}); }
                }

                if(!corte[x.id]) corte[x.id] = {cant: 0, total: 0};
                corte[x.id].cant++; corte[x.id].total += x.p;
            });
            
            try {
                const res = await fetch(URL, {method: 'POST', body: JSON.stringify({tipo: "VENTA", sucursal: vSuc, vendedor: vNom, items: agrupado})});
                const result = await res.json();
                
                if(result.status === "ok") {
                    localStorage.setItem('backup_corte', JSON.stringify(corte));
                    localStorage.removeItem('backup_venta');
                    alert("✅ Registro Exitoso");
                    carrito = []; actualizar(); cerrarCobro();
                } else { 
                    throw new Error(result.msg);
                }
            } catch(e) { 
                alert("Error de conexión. Se guardó respaldo local.");
                console.error(e); 
            }
            document.getElementById('loading').style.display = 'none';
        }

        async function enviarManual(data) { 
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading').style.opacity = '1'; 
            try { 
                await fetch(URL, {method: 'POST', body: JSON.stringify(data)}); 
                alert("✅ Registro Exitoso");
            } catch(e) { 
                alert("Error al enviar datos."); 
            } 
            document.getElementById('loading').style.display = 'none';
        }
        
        async function ajusteInv(modo) { 
            let d = { tipo: "AJUSTE_INV", modo: modo };
            if(modo == "TRASPASO") { 
                d.origen = prompt("Sucursal Origen:"); d.destino = prompt("Sucursal Destino:"); 
            } else { 
                d.ubicacion = prompt("Sucursal:");
            } 
            d.codigo = prompt("Código:"); d.cantidad = prompt("Cantidad:");
            if(d.codigo && d.cantidad) enviarManual(d);
        }
        
        async function modalEquipo() { 
            const m = prompt("Modelo:"), i = prompt("IMEI:"), n = prompt("Número:"), c = prompt("Cliente:"), e = prompt("Enganche:");
            if(m && i) enviarManual({tipo: "EQUIPO", modelo: m, imei: i, numero: n, nombre: c, enganche: e, sucursal: vSuc, vendedor: vNom});
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            let h = "";
            let tVentas = 0, tAbonos = 0, tGastos = 0, tRecargas = 0, tReparaciones = 0, tTotalCaja = 0;
            
            for(let id in corte) {
                let isGas = id.startsWith('GAS:');
                let isAbono = id === 'ABONO';
                let isRecarga = id === 'RECARGA';
                let isReparacion = id === 'REPARACION';
                let isNeg = corte[id].total < 0;
                
                // Colores adaptados para destacar sobre fondo oscuro
                let colorClass = isGas ? "text-red-400" : (isAbono ? "text-emerald-400" : (isRecarga ? "text-teal-400" : (isReparacion ? "text-emerald-300" : "text-slate-300")));
                let montoFormat = isNeg ? "-$" + Math.abs(corte[id].total).toFixed(2) : "$" + corte[id].total.toFixed(2);
                
                h += `<div class="flex justify-between border-b py-3 italic font-black uppercase text-xs ${colorClass} border-slate-700"><span>${corte[id].cant}x ${id}</span><span>${montoFormat}</span></div>`;
                
                if(isGas) { tGastos += Math.abs(corte[id].total); }
                else if(isAbono) { tAbonos += corte[id].total; }
                else if (isRecarga) { tRecargas += corte[id].total; }
                else if (isReparacion) { tReparaciones += corte[id].total; }
                else { tVentas += corte[id].total; }
                
                tTotalCaja += corte[id].total;
            }

            document.getElementById('corte-lista').innerHTML = h || "<p class='text-center py-10 opacity-30 text-sm'>Aún no hay movimientos</p>";
            
            // Desglose Visual Panel Final
            let breakdownHTML = `
                <div class="text-xs text-slate-300 flex justify-between uppercase mb-2"><span>Accesorios:</span><span>$${tVentas.toFixed(2)}</span></div>
                <div class="text-xs text-emerald-300 flex justify-between uppercase mb-2"><span>Reparaciones:</span><span>$${tReparaciones.toFixed(2)}</span></div>
                <div class="text-xs text-emerald-400 flex justify-between uppercase mb-2"><span>Abonos:</span><span>$${tAbonos.toFixed(2)}</span></div>
                <div class="text-xs text-teal-400 flex justify-between uppercase mb-2"><span>Recargas:</span><span>$${tRecargas.toFixed(2)}</span></div>
                <div class="text-xs text-red-400 flex justify-between uppercase mb-3"><span>Gastos:</span><span>-$${tGastos.toFixed(2)}</span></div>
           
                <div class="border-t border-slate-600 pt-3 text-xs text-slate-200 font-bold uppercase tracking-wider text-center mt-3">Efectivo Total Físico</div>
                <div class="text-emerald-400 text-4xl font-black text-center mt-2">$${tTotalCaja.toFixed(2)}</div>
            `;
            document.getElementById('total-corte').innerHTML = breakdownHTML;
            window.cortePuro = tVentas.toFixed(2);
        }

        async function enviarCorte() {
            const t = window.cortePuro || "0.00";
            if(confirm(`¿Cerrar turno oficial? Esto limpiará la pantalla para el siguiente turno.`)) {
                document.getElementById('loading').style.display = 'flex';
                try {
                    await fetch(URL, {method: 'POST', body: JSON.stringify({tipo: "VENTA", sucursal: vSuc, vendedor: vNom, items: [], corteX: t})});
                    localStorage.removeItem('backup_corte'); 
                    window.location.reload();
                } catch(e) { 
                    alert("Error al cerrar turno."); 
                }
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
