<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Credicel POS V17.3 - Botones Grandes y Sincronizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos base actualizados para botones y tarjetas más grandes */
        html, body { height: 100%; margin: 0; padding: 0; background: #f1f5f9; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden;}
        .app-container { display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available;}
        header { flex-shrink: 0; z-index: 50; padding-top: env(safe-area-inset-top, 0.75rem);}
        
        /* Cuadrícula de productos más grande */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 0.8rem; padding: 1rem;}
        .product-card { transition: all 0.1s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; display: flex; flex-direction: column; justify-content: space-between; height: 135px; background: white; border-radius: 1rem; padding: 0.8rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.08);}
        .product-card:active { transform: scale(0.95); background-color: #eff6ff;}
        
        .blue-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);}
        .sidebar { transition: transform 0.3s ease-in-out; width: 85%; max-width: 350px; position: fixed; inset: 0 auto 0 0; z-index: 300; background: white; border-right: 5px solid #1e3a8a; box-shadow: 10px 0 15px rgba(0,0,0,0.1);}
        .sidebar.closed { transform: translateX(-100%);}
        .content-main { flex: 1; display: flex; overflow: hidden;}
        .scroll-area { overflow-y: auto; -webkit-overflow-scrolling: touch;}
        #loading { display: flex; transition: opacity 0.3s ease;}
        @media (max-width: 768px) { .content-main { flex-direction: column; } .cart-panel { width: 100% !important; height: 45%; border-left: 0; border-top: 3px solid #cbd5e1;} }
    </style>
</head>
<body>

    <div id="loading" class="fixed inset-0 bg-black/70 z-[600] flex items-center justify-center text-white font-black uppercase text-center">
        <div class="p-6 bg-white rounded-3xl text-blue-900 shadow-2xl">
            <div class="animate-spin h-12 w-12 border-4 border-blue-900 border-t-transparent rounded-full mx-auto mb-4"></div>
            SINCRO MATRIZ...<br>
            <span class="text-xs font-bold opacity-60 tracking-widest">Iniciando Sistema</span>
        </div>
    </div>

    <div class="app-container">
        <header class="blue-gradient text-white shadow-lg flex flex-wrap gap-3 items-center justify-between p-4">
            <div class="flex flex-wrap gap-3">
                <button onclick="toggleSidebar()" class="bg-yellow-400 text-blue-900 px-4 py-3 rounded-xl font-black text-xs uppercase shadow-md active:scale-90">CORTE</button>
                <button onclick="modalEquipo()" class="bg-indigo-600 text-white px-4 py-3 rounded-xl font-black text-xs uppercase shadow-md active:scale-90">EQUIPO</button>
                <div id="admin-tools" class="hidden flex flex-wrap gap-2">
                    <button onclick="ajusteInv('ENTRADA')" class="bg-blue-500 px-4 py-3 rounded-xl font-black text-xs uppercase shadow-sm">Entrada</button>
                    <button onclick="ajusteInv('SALIDA')" class="bg-red-500 px-4 py-3 rounded-xl font-black text-xs uppercase shadow-sm">Ajuste</button>
                    <button onclick="ajusteInv('TRASPASO')" class="bg-blue-500 px-4 py-3 rounded-xl font-black text-xs uppercase shadow-sm">Traspaso</button>
                </div>
            </div>
            <div class="text-right">
                <div id="v-nom" class="font-black uppercase text-xs leading-none"></div>
                <div id="v-suc" class="font-bold text-yellow-400 text-[10px] uppercase mt-1"></div>
            </div>
        </header>

        <div class="content-main">
            <main class="flex-1 scroll-area">
                <div class="products-grid" id="grid"></div>
            </main>

            <aside class="cart-panel w-96 bg-white border-l flex flex-col shadow-xl">
                <div class="p-6 border-b text-center shrink-0">
                    <div class="text-4xl font-black text-blue-600 leading-none mb-4">$<span id="t-v">0.00</span></div>
                    <button onclick="abrirCobro()" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black text-2xl shadow-lg uppercase active:scale-95 transition">Cobrar</button>
                    <button onclick="limpiarVenta()" class="mt-3 text-xs text-slate-400 font-bold underline uppercase">Limpiar Carrito</button>
                </div>
                <div id="carrito" class="flex-1 scroll-area p-3 space-y-2"></div>
            </aside>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-white z-[400] flex items-center justify-center p-4">
        <div class="w-full max-w-md border-4 border-blue-900 p-8 rounded-[2.5rem] shadow-2xl text-center bg-white">
            <h1 class="text-5xl font-black text-blue-900 italic mb-8 uppercase">Credi<span class="text-yellow-400">cel</span></h1>
            <select id="sel-u" class="w-full p-5 border-2 rounded-xl mb-4 font-bold text-xl text-blue-900 bg-slate-50 outline-none"></select>
            <select id="sel-s" class="w-full p-5 border-2 rounded-xl mb-4 font-bold text-xl text-blue-900 bg-slate-50 outline-none">
                <option>Navojoa</option><option>Huatabampo</option><option>Bodega</option>
            </select>
            <input id="pin" type="password" inputmode="numeric" maxlength="6" class="w-full p-5 border-2 rounded-xl text-center text-3xl tracking-[15px] mb-6 outline-none" placeholder="****">
            <button onclick="login()" class="w-full blue-gradient text-white py-6 rounded-2xl font-black text-xl uppercase shadow-lg active:scale-95 transition">Entrar al Sistema</button>
        </div>
    </div>

    <div id="modal-cobro" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center p-4 z-[500]">
        <div class="bg-white rounded-[2rem] max-w-md w-full p-8 text-center shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-blue-900 uppercase italic">Finalizar Cobro</h2>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <button onclick="quickPay(100)" class="bg-slate-100 py-5 rounded-xl font-black text-xl text-slate-600 hover:bg-blue-50 transition">$100</button>
                <button onclick="quickPay(200)" class="bg-slate-100 py-5 rounded-xl font-black text-xl text-slate-600 hover:bg-blue-50 transition">$200</button>
                <button onclick="quickPay(500)" class="bg-slate-100 py-5 rounded-xl font-black text-xl text-slate-600 hover:bg-blue-50 transition">$500</button>
            </div>
            <input type="number" id="pago-cliente" oninput="calcCambio()" class="w-full p-5 border-2 rounded-xl text-center text-4xl font-black mb-6 outline-none" placeholder="0.00">
            <div class="p-5 bg-yellow-400 rounded-xl mb-6 text-blue-900 font-black">
                <p class="text-xs uppercase opacity-70 leading-none mb-1">Cambio a entregar:</p>
                <p class="text-5xl">$ <span id="cambio-v">0.00</span></p>
            </div>
            <button onclick="finalizarVenta()" class="w-full py-5 bg-blue-600 text-white rounded-xl font-black text-xl uppercase shadow-lg">Registrar Venta</button>
            <button onclick="cerrarCobro()" class="mt-6 text-xs font-bold underline uppercase block mx-auto text-slate-500">Volver al carrito</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar closed p-6 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl text-blue-900 uppercase italic">Resumen del Turno</h2>
            <button onclick="toggleSidebar()" class="text-5xl font-bold text-slate-400 hover:text-red-500">&times;</button>
        </div>
        <div id="corte-lista" class="flex-1 scroll-area text-xs font-bold text-slate-500 space-y-3"></div>
        <div class="p-5 bg-blue-900 rounded-3xl my-4 text-left" id="total-corte"></div>
        <button onclick="enviarCorte()" class="w-full bg-red-600 text-white py-5 rounded-xl font-black uppercase text-sm shadow-lg">Cerrar Turno Oficial</button>
    </div>

    <script>
        // --- NUEVA URL DE APPS SCRIPT ---
        const URL = "https://script.google.com/macros/s/AKfycbyNEFuO2yvcUQ7FRaS0vdKzly0g3xAa5yE3rJYZg4lOXiR1ZoDmi2zqoMMg9m-wAdQUYg/exec";
        
        let USERS = [], PRODS = [], carrito = [], vNom = "", vSuc = "", corte = {};
        
        window.onload = async () => {
            try {
                const res = await fetch(URL + "?action=getUsers");
                if (!res.ok) throw new Error('Network error');
                USERS = await res.json();
                document.getElementById('sel-u').innerHTML = USERS.map(u => `<option>${u.nombre}</option>`).join('');
                
                const memoU = localStorage.getItem('lastU'), memoS = localStorage.getItem('lastS');
                if(memoU) document.getElementById('sel-u').value = memoU;
                if(memoS) document.getElementById('sel-s').value = memoS;
                
                const backup = localStorage.getItem('backup_venta');
                if(backup) { carrito = JSON.parse(backup); actualizar(); }
                
                const backupCorte = localStorage.getItem('backup_corte');
                if(backupCorte) { corte = JSON.parse(backupCorte); }
            } catch (e) { 
                console.error(e);
                alert("Error al conectar con Matriz."); 
            } finally { 
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 300); 
            }
        };

        async function login() {
            const u = USERS.find(x => x.nombre.trim() == document.getElementById('sel-u').value.trim());
            if(u && u.pin.trim() == document.getElementById('pin').value.trim()) {
                vNom = u.nombre;
                vSuc = document.getElementById('sel-s').value;
                localStorage.setItem('lastU', vNom); localStorage.setItem('lastS', vSuc);
                if(vNom.toLowerCase() == "said") document.getElementById('admin-tools').classList.remove('hidden');
                
                document.getElementById('modal-login').style.display = 'none';
                document.getElementById('v-nom').innerText = vNom; document.getElementById('v-suc').innerText = vSuc;
                document.getElementById('loading').style.display = 'flex'; document.getElementById('loading').style.opacity = '1';
                
                try {
                    const res = await fetch(URL + "?action=getProducts");
                    PRODS = await res.json();
                    PRODS.push({id:'ABONO', n:'ABONO CRÉDITO', p:0}, {id:'REP', n:'REPARACIÓN/VAR', p:0}, {id:'GAS', n:'GASTO INTERNO', p:0}, {id:'RECARGA', n:'RECARGA SALDO', p:0});
                    pintar();
                } catch (e) { alert("Error al cargar productos."); }
                
                document.getElementById('loading').style.display = 'none';
            } else { 
                alert("PIN Incorrecto."); 
            }
        }

        function pintar() {
            // Textos más grandes en las tarjetas (text-xs, text-[10px], text-sm)
            document.getElementById('grid').innerHTML = PRODS.map(p => `
                <div onclick="clickProd('${p.id}', '${p.n}', ${p.p})" class="product-card">
                    <div class="text-blue-600 font-black text-xs uppercase truncate">${p.id}</div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase leading-tight overflow-hidden h-8">${p.n}</div>
                    <div class="text-blue-900 font-black text-sm">${['GAS', 'REP', 'ABONO', 'RECARGA'].includes(p.id) ? 'VAR' : '$'+p.p}</div>
                </div>`).join('');
        }

        function clickProd(id, n, p) {
            if(id === 'GAS') {
                const con = prompt("CONCEPTO DEL GASTO:");
                const mon = prompt("MONTO DEL GASTO:");
                if(con && mon > 0) {
                    const gastoF = parseFloat(mon);
                    enviarManual({ tipo: "GASTO", vendedor: vNom, sucursal: vSuc, concepto: con, monto: gastoF });
                    
                    const gastoNombre = 'GAS: ' + con.toUpperCase().substring(0, 15);
                    if(!corte[gastoNombre]) corte[gastoNombre] = {cant: 0, total: 0};
                    corte[gastoNombre].cant++;
                    corte[gastoNombre].total -= gastoF; 
                    localStorage.setItem('backup_corte', JSON.stringify(corte));
                }
            } else if(id === 'RECARGA') {
                const num = prompt("NÚMERO DE TELÉFONO:");
                if (num) {
                    const mon = prompt("MONTO DE LA RECARGA:");
                    if (mon > 0) add(id, "RECARGA: " + num, parseFloat(mon));
                }
            } else if(id === 'REP') {
                // Mantenemos la lógica de Modelo y Tipo de Reparación intacta
                const modelo = prompt("MODELO DEL EQUIPO:");
                if (modelo) {
                    const tipo = prompt("TIPO DE REPARACIÓN:");
                    if (tipo) {
                        const m = prompt("COSTO DE LA REPARACIÓN:");
                        if (m > 0) {
                            add("REPARACION", "REP: " + modelo + " (" + tipo + ")", parseFloat(m), {modelo: modelo, tipoRep: tipo});
                        }
                    }
                }
            } else if(id === 'ABONO') {
                const m = prompt("MONTO ABONO:");
                if(m > 0) add(id, n, parseFloat(m));
            } else { 
                add(id, n, p); 
            }
        }

        function add(id, n, p, extra = null) { 
            carrito.push({id, n, p, extra});
            localStorage.setItem('backup_venta', JSON.stringify(carrito));
            actualizar(); 
        }

        function actualizar() {
            // Textos más grandes en el carrito y botón de eliminar (text-2xl)
            document.getElementById('carrito').innerHTML = carrito.map((item, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl text-[11px] border-l-4 border-blue-600 mb-2 shadow-sm">
                    <span class="font-bold truncate w-48 uppercase text-slate-700">${item.n}</span>
                    <button onclick="del(${i})" class="text-red-500 text-2xl font-black px-2 hover:scale-110 active:scale-90 transition">&times;</button>
                </div>`).join('');
            document.getElementById('t-v').innerText = carrito.reduce((a, b) => a + b.p, 0).toFixed(2);
        }

        function del(i) { 
            carrito.splice(i, 1);
            localStorage.setItem('backup_venta', JSON.stringify(carrito)); 
            actualizar(); 
        }
        function limpiarVenta() { carrito = []; localStorage.removeItem('backup_venta'); actualizar(); }
        function abrirCobro() { if(carrito.length > 0) document.getElementById('modal-cobro').style.display = 'flex'; }
        function cerrarCobro() { document.getElementById('modal-cobro').style.display = 'none'; }
        function quickPay(n) { document.getElementById('pago-cliente').value = n; calcCambio(); }
        
        function calcCambio() { 
            const t = parseFloat(document.getElementById('t-v').innerText), p = parseFloat(document.getElementById('pago-cliente').value) || 0;
            document.getElementById('cambio-v').innerText = (p - t > 0) ? (p - t).toFixed(2) : "0.00";
        }

        async function finalizarVenta() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading').style.opacity = '1';
            
            const agrupado = [];
            carrito.forEach(x => {
                if (x.id === 'ABONO' || x.id === 'RECARGA' || x.id === 'REPARACION') {
                    agrupado.push({codigo: x.id, cantidad: 1, precio: x.p, extra: x.extra});
                } else {
                    let item = agrupado.find(i => i.codigo === x.id);
                    if(item) { item.cantidad++; item.precio += x.p; }
                    else { agrupado.push({codigo: x.id, cantidad: 1, precio: x.p}); }
                }

                if(!corte[x.id]) corte[x.id] = {cant: 0, total: 0};
                corte[x.id].cant++; corte[x.id].total += x.p;
            });
            
            try {
                const res = await fetch(URL, {method: 'POST', body: JSON.stringify({tipo: "VENTA", sucursal: vSuc, vendedor: vNom, items: agrupado})});
                const result = await res.json();
                
                if(result.status === "ok") {
                    localStorage.setItem('backup_corte', JSON.stringify(corte));
                    localStorage.removeItem('backup_venta');
                    alert("✅ Registro Exitoso");
                    carrito = []; actualizar(); cerrarCobro();
                } else { 
                    throw new Error(result.msg);
                }
            } catch(e) { 
                alert("Error de conexión. Se guardó respaldo local.");
                console.error(e); 
            }
            document.getElementById('loading').style.display = 'none';
        }

        async function enviarManual(data) { 
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading').style.opacity = '1'; 
            try { 
                await fetch(URL, {method: 'POST', body: JSON.stringify(data)}); 
                alert("✅ Registro Exitoso");
            } catch(e) { 
                alert("Error al enviar datos."); 
            } 
            document.getElementById('loading').style.display = 'none';
        }
        
        async function ajusteInv(modo) { 
            let d = { tipo: "AJUSTE_INV", modo: modo };
            if(modo == "TRASPASO") { 
                d.origen = prompt("Sucursal Origen:"); d.destino = prompt("Sucursal Destino:"); 
            } else { 
                d.ubicacion = prompt("Sucursal:");
            } 
            d.codigo = prompt("Código:"); d.cantidad = prompt("Cantidad:");
            if(d.codigo && d.cantidad) enviarManual(d);
        }
        
        async function modalEquipo() { 
            const m = prompt("Modelo:"), i = prompt("IMEI:"), n = prompt("Número:"), c = prompt("Cliente:"), e = prompt("Enganche:");
            if(m && i) enviarManual({tipo: "EQUIPO", modelo: m, imei: i, numero: n, nombre: c, enganche: e, sucursal: vSuc, vendedor: vNom});
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            let h = "";
            let tVentas = 0, tAbonos = 0, tGastos = 0, tRecargas = 0, tReparaciones = 0, tTotalCaja = 0;
            
            for(let id in corte) {
                let isGas = id.startsWith('GAS:');
                let isAbono = id === 'ABONO';
                let isRecarga = id === 'RECARGA';
                let isReparacion = id === 'REPARACION';
                let isNeg = corte[id].total < 0;
                
                let colorClass = isGas ? "text-red-400" : (isAbono ? "text-green-500" : (isRecarga ? "text-purple-500" : (isReparacion ? "text-blue-400" : "text-slate-600")));
                let montoFormat = isNeg ? "-$" + Math.abs(corte[id].total).toFixed(2) : "$" + corte[id].total.toFixed(2);
                
                h += `<div class="flex justify-between border-b py-3 italic font-black uppercase text-xs ${colorClass}"><span>${corte[id].cant}x ${id}</span><span>${montoFormat}</span></div>`;
                
                if(isGas) { tGastos += Math.abs(corte[id].total); }
                else if(isAbono) { tAbonos += corte[id].total; }
                else if (isRecarga) { tRecargas += corte[id].total; }
                else if (isReparacion) { tReparaciones += corte[id].total; }
                else { tVentas += corte[id].total; }
                
                tTotalCaja += corte[id].total;
            }

            document.getElementById('corte-lista').innerHTML = h || "<p class='text-center py-10 opacity-30 text-sm'>Aún no hay movimientos</p>";
            
            let breakdownHTML = `
                <div class="text-xs text-white opacity-80 flex justify-between uppercase mb-2"><span>Accesorios:</span><span>$${tVentas.toFixed(2)}</span></div>
                <div class="text-xs text-blue-300 flex justify-between uppercase mb-2"><span>Reparaciones:</span><span>$${tReparaciones.toFixed(2)}</span></div>
                <div class="text-xs text-green-400 flex justify-between uppercase mb-2"><span>Abonos:</span><span>$${tAbonos.toFixed(2)}</span></div>
                <div class="text-xs text-purple-400 flex justify-between uppercase mb-2"><span>Recargas:</span><span>$${tRecargas.toFixed(2)}</span></div>
                <div class="text-xs text-red-400 flex justify-between uppercase mb-3"><span>Gastos:</span><span>-$${tGastos.toFixed(2)}</span></div>
           
                <div class="border-t border-blue-700 pt-3 text-xs text-white font-bold uppercase tracking-wider text-center mt-3">Efectivo Total Físico</div>
                <div class="text-yellow-400 text-4xl font-black text-center mt-2">$${tTotalCaja.toFixed(2)}</div>
            `;
            document.getElementById('total-corte').innerHTML = breakdownHTML;
            window.cortePuro = tVentas.toFixed(2);
        }

        async function enviarCorte() {
            const t = window.cortePuro || "0.00";
            if(confirm(`¿Cerrar turno oficial? Esto limpiará la pantalla para el siguiente turno.`)) {
                document.getElementById('loading').style.display = 'flex';
                try {
                    await fetch(URL, {method: 'POST', body: JSON.stringify({tipo: "VENTA", sucursal: vSuc, vendedor: vNom, items: [], corteX: t})});
                    localStorage.removeItem('backup_corte'); 
                    window.location.reload();
                } catch(e) { 
                    alert("Error al cerrar turno."); 
                }
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
