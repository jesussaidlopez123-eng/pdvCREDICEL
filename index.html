<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Credicel POS - V11.2 Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card { transition: all 0.1s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }
        .product-card:active { transform: scale(0.95); background-color: #eff6ff; }
        .rep-card { border: 2px solid #1e3a8a; background-color: #fefce8; } 
        .gas-card { border: 2px solid #dc2626; background-color: #fee2e2; }
        .blue-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .sidebar { transition: transform 0.3s ease-in-out; width: 300px; }
        .sidebar.closed { transform: translateX(-100%); }
        
        /* ESTRUCTURA GENERAL */
        html, body { height: 100%; margin: 0; overflow: hidden; background: #f1f5f9; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .content-area { flex: 1; display: flex; overflow: hidden; }
        
        /* ÁREA DE PRODUCTOS (IZQUIERDA) */
        .grid-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
            padding-bottom: 120px; /* ESPACIO EXTRA AL FINAL PARA QUE NO SE CORTE LA ÚLTIMA FILA */
        }
        
        /* CARRITO LATERAL (DERECHA) */
        .cart-aside { 
            width: 320px; 
            display: flex; 
            flex-direction: column; 
            background: white; 
            border-left: 1px solid #cbd5e1;
            height: 100%;
        }
        .cart-header-actions { 
            background: #1e3a8a; 
            padding: 12px; 
            color: white;
            shrink-0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
        }
        
        /* LISTA DE PRODUCTOS DEL CARRITO CON SCROLL PROPIO */
        .cart-items { 
            flex: 1; 
            overflow-y: auto; 
            padding: 8px; 
            padding-bottom: 50px; /* ESPACIO AL FINAL DEL CARRITO */
            -webkit-overflow-scrolling: touch; /* MEJORA EL SCROLL EN TABLETS */
        }
        
        #loading-overlay { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loading-overlay" class="fixed inset-0 bg-blue-900/50 z-[300] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-5 rounded-2xl font-black text-blue-900 animate-pulse uppercase">Sincronizando...</div>
    </div>

    <div id="sidebar-corte" class="sidebar closed fixed inset-y-0 left-0 bg-white z-[250] shadow-2xl flex flex-col p-6 border-r-4 border-blue-900">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-blue-900 uppercase text-sm">Resumen de Hoy</h2>
            <button onclick="toggleCorte()" class="text-2xl">&times;</button>
        </div>
        <div id="lista-detalle-corte" class="flex-1 overflow-y-auto text-xs space-y-1 custom-scroll"></div>
        <div class="p-4 bg-blue-900 rounded-xl text-center text-yellow-400 font-black text-2xl mt-4" id="corte-monto">$0.00</div>
        <button onclick="ejecutarCorte()" class="w-full bg-red-600 text-white font-black py-3 rounded-xl mt-4 uppercase text-[10px]">Cerrar Turno</button>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-4">
        <div class="max-w-sm w-full text-center">
            <div class="mb-8 font-black text-4xl text-blue-900 italic text-center">CREDI<span class="text-yellow-400">CEL</span></div>
            <div class="space-y-4">
                <select id="user-select" class="w-full p-4 border rounded-xl font-bold bg-slate-50 text-blue-900"></select>
                <input id="user-pin" type="password" maxlength="6" inputmode="numeric" class="w-full p-4 border rounded-xl text-center text-2xl tracking-[10px] font-bold bg-slate-50" placeholder="****">
                <button onclick="intentarEntrar()" class="w-full blue-gradient text-white font-black py-4 rounded-xl shadow-lg uppercase">Entrar</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden app-container">
        <header class="blue-gradient text-white p-2 flex justify-between items-center shadow-lg shrink-0">
            <button onclick="toggleCorte()" class="bg-yellow-400 text-blue-900 px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-md">CORTE</button>
            <div class="font-black text-lg tracking-tighter">CREDI<span class="text-yellow-400">CEL</span></div>
            <span id="label-vendedor" class="font-bold uppercase text-[10px] pr-2"></span>
        </header>

        <div class="content-area">
            <main class="grid-area custom-scroll">
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2" id="grid-productos"></div>
            </main>

            <aside class="cart-aside">
                <div class="cart-header-actions">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] uppercase font-bold opacity-80">Total Venta:</span>
                        <span class="text-2xl font-black">$<span id="total-venta">0.00</span></span>
                    </div>
                    <button onclick="irACobrar()" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl shadow-lg text-xl uppercase transition-all mb-2 border-b-4 border-green-700">COBRAR</button>
                    <div class="flex justify-between text-[8px] font-black">
                        <span class="italic opacity-60 uppercase">Productos Agregados</span>
                        <button onclick="carrito=[];actualizarCarrito()" class="text-yellow-400 underline uppercase">Limpiar</button>
                    </div>
                </div>

                <div id="lista-carrito" class="cart-items space-y-2 custom-scroll"></div>
            </aside>
        </div>
    </div>

    <div id="modal-cobro" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center p-4 z-[200]">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl text-center border-t-8 border-blue-900">
            <h2 class="text-xl font-black mb-4 text-blue-900 uppercase italic">Cobrar Venta</h2>
            <input type="number" id="monto-pagado" oninput="actualizarCambio()" class="w-full p-4 border rounded-2xl text-center text-3xl font-black mb-4" placeholder="0.00">
            <div class="p-4 bg-yellow-400 rounded-2xl mb-6 text-blue-900 font-black">
                <p class="text-[10px] uppercase opacity-60">Cambio:</p>
                <p class="text-4xl">$ <span id="cambio-texto">0.00</span></p>
            </div>
            <button id="btn-finalizar" onclick="finalizarVenta()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black uppercase shadow-lg text-lg">REGISTRAR VENTA</button>
            <button onclick="cerrarCobro()" class="text-slate-400 font-bold uppercase text-[10px] mt-4 block mx-auto">Regresar</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz3csNB3HvCuaqUP-0d0zo_Z_9sHrKTtr8QY811jp-DgviIg9e807AsBV85UnTJUGQegg/exec";
        
        let PRODUCTOS = []; 
        let LISTA_USUARIOS = [];
        let carrito = []; 
        let vendedorActivo = "";
        let ventasAcumuladasDia = {};
        let gastosDelDia = [];

        function saveLocalMemory() {
            const data = { v: ventasAcumuladasDia, g: gastosDelDia, user: vendedorActivo, fecha: new Date().toDateString() };
            localStorage.setItem('credicel_backup', JSON.stringify(data));
        }

        function loadLocalMemory() {
            const saved = JSON.parse(localStorage.getItem('credicel_backup'));
            const hoy = new Date().toDateString();
            if(saved && saved.fecha === hoy && saved.user === vendedorActivo) {
                ventasAcumuladasDia = saved.v || {};
                gastosDelDia = saved.g || [];
            }
        }

        window.onload = async () => {
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const res = await fetch(WEB_APP_URL + "?getUsers=true");
                LISTA_USUARIOS = await res.json();
                document.getElementById('user-select').innerHTML = LISTA_USUARIOS.map(u => `<option value="${u.nombre}">${u.nombre}</option>`).join('');
            } catch (e) { alert("Error de conexión"); }
            document.getElementById('loading-overlay').style.display = 'none';
        };

        async function intentarEntrar() {
            const nombreSel = document.getElementById('user-select').value;
            const pinIngresado = document.getElementById('user-pin').value;
            const usuario = LISTA_USUARIOS.find(u => u.nombre === nombreSel);

            if (usuario && usuario.pin.toString() === pinIngresado) {
                vendedorActivo = nombreSel;
                document.getElementById('loading-overlay').style.display = 'flex';
                loadLocalMemory();
                try {
                    const resP = await fetch(WEB_APP_URL + "?getProducts=true");
                    PRODUCTOS = await resP.json();
                    PRODUCTOS.push({id:'REP', n:'REPARACION', p:0}, {id:'GAS', n:'GASTO', p:0});
                    pintarProductos();

                    const resC = await fetch(WEB_APP_URL + "?getLiveCorte=true&user=" + encodeURIComponent(vendedorActivo));
                    const corte = await resC.json();
                    if(corte) {
                        ventasAcumuladasDia = corte.ventas || {};
                        gastosDelDia = corte.gastos || [];
                        saveLocalMemory();
                    }
                } catch (e) { console.log("Memoria Local Activa"); }

                document.getElementById('label-vendedor').innerText = vendedorActivo;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('loading-overlay').style.display = 'none';
            } else { alert("PIN Incorrecto"); }
        }

        function toggleCorte() { document.getElementById('sidebar-corte').classList.toggle('closed'); pintarDetalleCorte(); }

        function pintarDetalleCorte() {
            const listaV = document.getElementById('lista-detalle-corte');
            let totalV = 0, totalG = 0, html = "";
            for (let id in ventasAcumuladasDia) {
                let v = ventasAcumuladasDia[id]; totalV += v.total;
                html += `<div class="flex justify-between border-b py-1"><span>${v.cant}x ${id}</span><span>$${v.total.toFixed(2)}</span></div>`;
            }
            gastosDelDia.forEach(g => { totalG += g.monto; html += `<div class="flex justify-between text-red-500 italic"><span>- ${g.concepto}</span><span>$${g.monto.toFixed(2)}</span></div>`; });
            listaV.innerHTML = html || "<p class='text-center py-4 opacity-30'>Vacío</p>";
            document.getElementById('corte-monto').innerText = "$" + (totalV - totalG).toFixed(2);
        }

        function pintarProductos() {
            document.getElementById('grid-productos').innerHTML = PRODUCTOS.map(p => `
                <div onclick="clickProducto('${p.id}', '${p.n}', ${p.p})" class="product-card bg-white p-2 rounded-xl text-center shadow-sm flex flex-col justify-between h-24 ${p.id==='REP' ? 'rep-card' : ''} ${p.id==='GAS' ? 'gas-card' : ''}">
                    <p class="text-blue-600 font-black text-sm">${p.id}</p>
                    <p class="text-[7px] font-bold text-slate-400 uppercase leading-tight">${p.n}</p>
                    <p class="text-blue-900 font-black text-xs">${(p.id==='REP' || p.id==='GAS') ? 'VAR' : '$'+p.p}</p>
                </div>`).join('');
        }

        function clickProducto(id, n, p) {
            if(id === 'GAS') {
                const con = prompt("¿Concepto?"); const mon = prompt("¿Monto?");
                const monNum = parseFloat(mon);
                if(!isNaN(monNum) && monNum > 0) registrarGastoServidor(con, monNum);
            } else if(id === 'REP') {
                const m = prompt("¿Monto?"); const mNum = parseFloat(m);
                if(!isNaN(mNum) && mNum > 0) agregar(id, n, mNum);
            } else { agregar(id, n, p); }
        }

        async function registrarGastoServidor(concepto, monto) {
            new Image().src = WEB_APP_URL + "?tipo=GASTO&user=" + encodeURIComponent(vendedorActivo) + "&concepto=" + encodeURIComponent(concepto) + "&monto=" + monto;
            gastosDelDia.push({concepto, monto});
            saveLocalMemory();
            alert("✅ Gasto registrado");
        }

        function agregar(id, n, p) { carrito.push({id, n, p}); actualizarCarrito(); }
        
        function actualizarCarrito() {
            document.getElementById('lista-carrito').innerHTML = carrito.map((item, i) => `
                <div class="flex items-center justify-between bg-slate-50 p-2 rounded-lg border-l-4 border-blue-600 shadow-sm text-[10px]">
                    <div class="flex-1 min-w-0 pr-1">
                        <span class="truncate block text-blue-900 font-bold">${item.n}</span>
                        <span class="text-[8px] text-slate-400">${item.id}</span>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <span class="font-black text-blue-900">$${item.p}</span>
                        <button onclick="eliminar(${i})" class="text-red-500 font-black text-xl px-2">×</button>
                    </div>
                </div>`).join('');
            document.getElementById('total-venta').innerText = carrito.reduce((s, i) => s + i.p, 0).toFixed(2);
            const container = document.getElementById('lista-carrito');
            container.scrollTop = container.scrollHeight;
        }

        function eliminar(i) { carrito.splice(i, 1); actualizarCarrito(); }
        function irACobrar() { if(carrito.length > 0) document.getElementById('modal-cobro').style.display = 'flex'; }
        function cerrarCobro() { document.getElementById('modal-cobro').style.display = 'none'; }
        
        function actualizarCambio() {
            const t = parseFloat(document.getElementById('total-venta').innerText);
            const p = parseFloat(document.getElementById('monto-pagado').value) || 0;
            document.getElementById('cambio-texto').innerText = (p - t > 0) ? (p - t).toFixed(2) : "0.00";
        }

        async function finalizarVenta() {
            const btn = document.getElementById('btn-finalizar'); btn.disabled = true;
            document.getElementById('loading-overlay').style.display = 'flex';
            const agrupado = {};
            carrito.forEach(item => {
                if(!agrupado[item.id]) agrupado[item.id] = { codigo: item.id, cantidad: 0, total: 0 };
                agrupado[item.id].cantidad += 1; agrupado[item.id].total += item.p;
                if(!ventasAcumuladasDia[item.id]) ventasAcumuladasDia[item.id] = { cant: 0, total: 0 };
                ventasAcumuladasDia[item.id].cant += 1; ventasAcumuladasDia[item.id].total += item.p;
            });
            saveLocalMemory();
            const itemsFinales = Object.values(agrupado).map(i => ({ codigo: i.codigo, cantidad: i.cantidad, precio: i.total }));
            new Image().src = WEB_APP_URL + "?user=" + encodeURIComponent(vendedorActivo) + "&items=" + encodeURIComponent(JSON.stringify(itemsFinales));
            setTimeout(() => {
                alert("✅ Venta Guardada");
                carrito = []; actualizarCarrito(); cerrarCobro();
                document.getElementById('loading-overlay').style.display = 'none';
                btn.disabled = false;
            }, 1000);
        }

        function ejecutarCorte() { if(confirm("¿CERRAR TURNO?")) { localStorage.removeItem('credicel_backup'); window.location.reload(); } }
    </script>
</body>
</html>
